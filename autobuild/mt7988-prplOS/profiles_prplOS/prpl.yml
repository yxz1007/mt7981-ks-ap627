diffconfig: |
          CONFIG_PACKAGE_rpcd-mod-luci=y
          CONFIG_PACKAGE_ip-full=y
          CONFIG_PACKAGE_ip-bridge=y
          CONFIG_SYSLOGNG_LOGROTATE=y
          CONFIG_SYSLOGNG_LOGROTATE_MAXSIZE="5M"
